name: 'Bug Report'
description: 'Report a bug to help us improve Claude with Leetcode community'
body:
    - type: 'markdown'
      attributes:
          value: |-
              > [!IMPORTANT]
              > Thanks for taking the time to fill out this bug report!
              >
              > Please search **[existing issues](https://github.com/Stewie-pixel/claude-with-leetcode/issues)** to see if an issue already exists for the bug you encountered.

    - type: 'textarea'
      id: 'problem'
      attributes:
          label: 'What happened?'
          description: 'A clear and concise description of what the bug is.'
      validations:
          required: true

    - type: 'textarea'
      id: 'expected'
      attributes:
          label: 'What did you expect to happen?'
      validations:
          required: true

    - type: 'textarea'
      id: 'info'
      attributes:
          label: 'Proof Validation'
          description: 'Please provide any evidence or steps to reproduce the issue. Consider removing any sensitive information before submitting.'
      validations:
          required: true

    - type: 'textarea'
      id: 'additional-context'
      attributes:
          label: 'Anything else we need to know?'
          description: 'Add any other context about the problem here.'
