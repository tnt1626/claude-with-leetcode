name: Release

on:
    push:
        tags:
            - 'v*.*.*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Version tag to release'
                required: true
                type: string

jobs:
    release:
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'Stewie-pixel/claude-with-leetcode' }}

        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: 'Generate GitHub App Token'
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.PRIVATE_KEY }}

            - name: Resolve tag name
              id: tag
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
                  else
                    echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
                  fi

            - name: Extract changelog entry for this version
              id: changelog
              run: |
                  TAG="${{ steps.tag.outputs.name }}"
                  VERSION="${TAG#v}"

                  # Extract the block between this version header and the next
                  NOTES=$(awk \
                    "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
                    CHANGELOG.md)

                  if [ -z "$NOTES" ]; then
                    echo "No changelog entry found for ${TAG} — using auto-generated notes."
                    echo "body=" >> $GITHUB_OUTPUT
                  else
                    echo "body<<EOF" >> $GITHUB_OUTPUT
                    echo "$NOTES" >> $GITHUB_OUTPUT
                    echo "EOF" >> $GITHUB_OUTPUT
                  fi

            - name: Create GitHub release
              uses: actions/github-script@v7
              env:
                  RELEASE_BODY: ${{ steps.changelog.outputs.body }}
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const tag = '${{ steps.tag.outputs.name }}';
                      const body = process.env.RELEASE_BODY?.trim();
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      let existingRelease = null;
                      try {
                          const { data } = await github.rest.repos.getReleaseByTag({
                              owner, repo, tag,
                          });
                          existingRelease = data;
                      } catch (err) {
                          if (err.status !== 404) throw err;
                      }

                      let release;

                      if (existingRelease) {
                          core.info(`Release for ${tag} already exists — updating...`);
                          const { data } = await github.rest.repos.updateRelease({
                              owner, repo,
                              release_id: existingRelease.id,
                              name: tag,
                              body: body || existingRelease.body,
                              draft: false,
                              prerelease: tag.includes('-'),
                          });
                          release = data;
                      } else {
                          core.info(`Creating new release for ${tag}...`);
                          const { data } = await github.rest.repos.createRelease({
                              owner, repo,
                              tag_name: tag,
                              name: tag,
                              body: body || undefined,
                              generate_release_notes: true,
                              draft: false,
                              prerelease: tag.includes('-'),
                          });
                          release = data;
                      }

                      core.info(`Release ready: ${release.html_url}`);
                      core.setOutput('url', release.html_url);
