name: Release

on:
    push:
        tags:
            - 'v*.*.*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Version tag to release'
                required: true
                type: string

jobs:
    release:
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'Stewie-pixel/claude-with-leetcode' }}

        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.PRIVATE_KEY }}

            - name: Resolve and Ensure Tag
              id: tag
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    TAG_NAME="${{ github.event.inputs.tag }}"
                  else
                    TAG_NAME="${GITHUB_REF#refs/tags/}"
                  fi

                  echo "name=$TAG_NAME" >> $GITHUB_OUTPUT

                  # Ensure the tag exists locally and on remote for manual dispatches
                  if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
                    echo "Tag $TAG_NAME not found. Creating it now..."
                    git tag "$TAG_NAME"
                    git push origin "$TAG_NAME"
                  fi

            - name: Extract changelog entry
              id: changelog
              run: |
                  TAG="${{ steps.tag.outputs.name }}"
                  VERSION="${TAG#v}"

                  NOTES=$(awk \
                    "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
                    CHANGELOG.md)

                  if [ -z "$NOTES" ]; then
                    echo "No changelog entry found for ${TAG}."
                    echo "body=" >> $GITHUB_OUTPUT
                  else
                    echo "body<<EOF" >> $GITHUB_OUTPUT
                    echo "$NOTES" >> $GITHUB_OUTPUT
                    echo "EOF" >> $GITHUB_OUTPUT
                  fi

            - name: Upsert GitHub Release
              uses: actions/github-script@v9
              env:
                  RELEASE_BODY: ${{ steps.changelog.outputs.body }}
              with:
                  github-token: ${{ steps.app-token.outputs.token }}
                  script: |
                      const tag = '${{ steps.tag.outputs.name }}';
                      const body = process.env.RELEASE_BODY?.trim();
                      const { owner, repo } = context.repo;

                      let existingRelease = null;
                      try {
                          const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
                          existingRelease = data;
                      } catch (err) {
                          if (err.status !== 404) throw err;
                      }

                      if (existingRelease) {
                          core.info(`Updating existing release: ${tag}`);
                          await github.rest.repos.updateRelease({
                              owner, repo,
                              release_id: existingRelease.id,
                              name: tag,
                              body: body || existingRelease.body,
                              prerelease: tag.includes('-')
                          });
                      } else {
                          core.info(`Creating new release: ${tag}`);
                          await github.rest.repos.createRelease({
                              owner, repo,
                              tag_name: tag,
                              name: tag,
                              body: body || undefined,
                              generate_release_notes: !body,
                              prerelease: tag.includes('-')
                          });
                      }
