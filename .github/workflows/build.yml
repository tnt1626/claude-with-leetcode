name: Build README

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Detect new problems and update site data
        run: node detectNewProblems.js

      - name: Update problem site data
        run: node updateSiteData.js

      - name: Verify site data URLs
        run: node verifySiteData.js

      - name: Build README
        run: node updateTable.js

      - name: Check for modified files
        id: git-check
        run: |
          echo modified=$(if git diff-index --quiet HEAD --; then echo "false"; else echo "true"; fi) >> $GITHUB_OUTPUT

      - name: Push changes
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git config --global user.email "${{ secrets.BOT_EMAIL }}"
          git config --global user.name "${{ secrets.BOT_USERNAME }}"
          git add .
          git commit -m "Update README table"
          git push || git pull --rebase && git push