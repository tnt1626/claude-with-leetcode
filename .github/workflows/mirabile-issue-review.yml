name: Issue Review

on:
    issue_comment:
        types: [created]
    issues:
        types: [opened, assigned]

jobs:
    review:
        if: |
            (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@mirabile')) ||
            (github.event_name == 'issues' && (contains(github.event.issue.body, '@mirabile') || contains(github.event.issue.title, '@mirabile')))
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            issues: write
            id-token: write
            actions: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Generate GitHub App Token
              id: generate_token
              if: ${{ env.APP_ID != '' }}
              env:
                  APP_ID: ${{ secrets.APP_ID }}
              uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b
              with:
                  app-id: ${{ secrets.APP_ID }}
                  private-key: ${{ secrets.PRIVATE_KEY }}

            - name: Extract issue data
              run: |
                  TITLE="${{ github.event.issue.title }}"

                  BODY=$(cat <<'EOF'
                  ${{ github.event.issue.body }}
                  EOF
                  )

                  echo "TITLE<<EOF" >> $GITHUB_ENV
                  echo "$TITLE" >> $GITHUB_ENV
                  echo "EOF" >> $GITHUB_ENV

                  echo "BODY<<EOF" >> $GITHUB_ENV
                  echo "$BODY" >> $GITHUB_ENV
                  echo "EOF" >> $GITHUB_ENV

            - name: Run issue review
              env:
                  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
                  OPENROUTER_MODEL: 'nvidia/nemotron-3-super-120b-a12b:free'
              run: |
                  NUMBER="${{ github.event.issue.number }}"
                  URL="https://github.com/${{ github.repository }}/issues/$NUMBER"
                  LABELS="${{ join(github.event.issue.labels.*.name, ', ') }}"
                  AUTHOR="${{ github.event.issue.user.login }}"

                  PROMPT="You are Mirabile, an AI assistant integrated into the claude-with-leetcode GitHub repository — an open-source project that uses Claude AI to automatically generate daily DSA (Data Structures & Algorithms) lectures from LeetCode solutions committed by developers.

                  Your job is to review the following GitHub issue and provide a structured, insightful analysis that helps the maintainer understand the issue quickly and act on it effectively.

                  ---

                  Issue Details:
                  Issue: #$NUMBER
                  Link: $URL
                  Author: @$AUTHOR
                  Labels: $LABELS
                  Title: $TITLE
                  Description:
                  $BODY

                  ---

                  Provide your review in this structure:

                  ## 🔍 Issue Summary
                  One sentence describing what this issue is about.

                  ## 💡 Key Points
                  Bullet points highlighting the most important aspects.

                  ## ⚠️ Potential Impact
                  What could break or be affected if this is not addressed.

                  ## ✅ Suggested Next Steps
                  Concrete actions the maintainer or contributor should take.

                  Be concise, technical, and actionable. Do not repeat the issue title verbatim."

                  RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
                      -H "Authorization: Bearer $OPENROUTER_API_KEY" \
                      -H "Content-Type: application/json" \
                      -d "$(jq -n \
                          --arg model "$OPENROUTER_MODEL" \
                          --arg content "$PROMPT" \
                          '{model: $model, messages: [{role: "user", content: $content}]}'
                      )")

                  REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

                  if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
                      echo "No review generated, skipping comment."
                      exit 0
                  fi

                  echo "REVIEW<<EOF" >> $GITHUB_ENV
                  echo "$REVIEW" >> $GITHUB_ENV
                  echo "EOF" >> $GITHUB_ENV

            - name: Post review comment
              env:
                  GITHUB_TOKEN: ${{ steps.generate_token.outputs.token || secrets.GITHUB_TOKEN }}
              run: |
                  FOOTER="---
                  *Review generated by [@mirabile](https://github.com/apps/mirabile) · [claude-with-leetcode](https://github.com/Stewie-pixel/claude-with-leetcode)*"

                  FULL_REVIEW="$REVIEW

                  $FOOTER"

                  curl -s -X POST \
                      -H "Authorization: token $GITHUB_TOKEN" \
                      -H "Content-Type: application/json" \
                      https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
                      -d "$(jq -n --arg body "$FULL_REVIEW" '{body: $body}')"
